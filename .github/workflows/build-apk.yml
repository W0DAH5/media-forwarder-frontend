name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Expo / EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm   # <-- THIS FIXES THE YARN ERROR

      - name: Ensure eas.json exists
        run: |
          if [ ! -f eas.json ]; then
            cat > eas.json << 'EOF'
          {
            "cli": {
              "version": ">= 3.0.0"
            },
            "build": {
              "production": {
                "android": {
                  "buildType": "apk"
                }
              }
            }
          }
          EOF
          fi

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        run: npx eas build -p android --profile production --non-interactive

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            build-*.apk
            android/app/build/outputs/apk/release/*.apk