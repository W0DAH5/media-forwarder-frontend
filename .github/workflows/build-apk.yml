name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Allow the workflow to create releases
permissions:
  contents: write

# Version variable – increment this manually for each new release
env:
  APP_VERSION: 1.0.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix Hermes compiler permissions
        run: |
          chmod +x node_modules/react-native/sdks/hermesc/linux64-bin/hermesc

      - name: Install Expo CLI globally
        run: npm install -g expo

      - name: Prebuild Android
        run: expo prebuild --platform android --clean

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK as artifact (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}